<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peru Trip Flight Tracker</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        
        .info-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 16px;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.12);
            max-width: 340px;
            font-size: 13px;
            z-index: 1;
        }
        
        .info-panel h1 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #444;
        }
        
        .flights-row {
            display: flex;
            gap: 8px;
        }
        
        .flight-info {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        
        .flight-info.aa621 {
            border-left-color: #2563eb;
        }
        
        .flight-info.aa917 {
            border-left-color: #ea580c;
        }
        
        .flight-info .flight-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            margin-bottom: 8px;
        }
        
        .flight-info h2 {
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            color: #111;
            line-height: 1.2;
        }
        
        .flight-info .route {
            font-size: 11px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        
        .flight-info .details {
            font-size: 11px;
            color: #666;
            line-height: 1.6;
        }
        
        .flight-info .detail-row {
            display: flex;
            justify-content: space-between;
        }
        
        .flight-info .detail-label {
            color: #999;
        }
        
        .flight-info .detail-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #333;
        }
        
        .flight-info .waiting {
            font-size: 11px;
            color: #aaa;
            font-style: italic;
        }
        
        .status {
            font-size: 10px;
            color: #aaa;
            margin-top: 8px;
        }
        
        @media (max-width: 600px) {
            .info-panel {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                max-width: none;
                border-radius: 14px 14px 0 0;
                padding: 14px 16px;
                padding-bottom: max(14px, env(safe-area-inset-bottom));
                box-shadow: 0 -1px 8px rgba(0,0,0,0.1);
            }
            
            .info-panel h1 {
                font-size: 12px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel">
        <h1>Peru Trip Flight Tracker</h1>
        <div id="flights-container" class="flights-row"></div>
        <div class="status" id="status">Loading...</div>
    </div>

    <script>
        const MAPBOX_TOKEN = 'pk.eyJ1Ijoic3RpbGVzIiwiYSI6ImNsd3Rpc3V2aTAzeXUydm9sMHdoN210b2oifQ.66AJmPYxe2ixku1o7Rwdlg';
        
        mapboxgl.accessToken = MAPBOX_TOKEN;
        
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/light-v11',
            center: [-85, 15],
            zoom: 3,
            projection: 'mercator'
        });
        
        const AIRPORTS = {
            LAX: [-118.4085, 33.9416],
            MIA: [-80.2906, 25.7959],
            LIM: [-77.1144, -12.0219]
        };
        
        const FLIGHT_COLORS = {
            AA621: '#2563eb',
            AA917: '#ea580c'
        };
        
        const FLIGHT_ROUTES = {
            AA621: { origin: 'LAX', dest: 'MIA' },
            AA917: { origin: 'MIA', dest: 'LIM' }
        };
        
        let flightData = null;
        let initialFitDone = false;
        
        function createPlaneIcon() {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24">
                <path fill="#111" stroke="#fff" stroke-width="0.5" d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
            </svg>`;
            const img = new Image(28, 28);
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
            return img;
        }
        
        function greatCircle(start, end, numPoints = 100) {
            const [lon1, lat1] = start;
            const [lon2, lat2] = end;
            const coords = [];
            
            for (let i = 0; i <= numPoints; i++) {
                const f = i / numPoints;
                const lat1Rad = lat1 * Math.PI / 180;
                const lat2Rad = lat2 * Math.PI / 180;
                const lon1Rad = lon1 * Math.PI / 180;
                const lon2Rad = lon2 * Math.PI / 180;
                
                const a = Math.sin((1 - f) * Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad))) / 
                          Math.sin(Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad)));
                const b = Math.sin(f * Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad))) / 
                          Math.sin(Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad)));
                
                const x = a * Math.cos(lat1Rad) * Math.cos(lon1Rad) + b * Math.cos(lat2Rad) * Math.cos(lon2Rad);
                const y = a * Math.cos(lat1Rad) * Math.sin(lon1Rad) + b * Math.cos(lat2Rad) * Math.sin(lon2Rad);
                const z = a * Math.sin(lat1Rad) + b * Math.sin(lat2Rad);
                
                const latRad = Math.atan2(z, Math.sqrt(x * x + y * y));
                const lonRad = Math.atan2(y, x);
                
                coords.push([lonRad * 180 / Math.PI, latRad * 180 / Math.PI]);
            }
            
            return coords;
        }
        
        function updateFlightInfo(data) {
            const container = document.getElementById('flights-container');
            container.innerHTML = '';
            
            Object.keys(data.flights).forEach(flightNum => {
                const flight = data.flights[flightNum];
                const positions = flight.positions;
                const lastPos = positions[positions.length - 1];
                
                const div = document.createElement('div');
                div.className = `flight-info ${flightNum.toLowerCase()}`;
                
                const routeParts = flight.route.split('-');
                const routeDisplay = routeParts.join(' → ');
                
                if (lastPos) {
                    const alt = lastPos.alt ? Math.round(lastPos.alt).toLocaleString() : '—';
                    const speed = lastPos.speed ? Math.round(lastPos.speed) : '—';
                    const timeSince = Math.round((Date.now() / 1000 - lastPos.ts) / 60);
                    const timeLabel = timeSince < 1 ? 'just now' : `${timeSince}m ago`;
                    
                    div.innerHTML = `
                        <div class="flight-header">
                            <h2>${flightNum}</h2>
                            <span class="route">${routeDisplay}</span>
                        </div>
                        <div class="details">
                            <div class="detail-row"><span class="detail-label">Alt</span><span class="detail-value">${alt} ft</span></div>
                            <div class="detail-row"><span class="detail-label">Speed</span><span class="detail-value">${speed} kt</span></div>
                            <div class="detail-row"><span class="detail-label">Updated</span><span class="detail-value">${timeLabel}</span></div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="flight-header">
                            <h2>${flightNum}</h2>
                            <span class="route">${routeDisplay}</span>
                        </div>
                        <div class="waiting">Waiting for departure</div>
                    `;
                }
                
                container.appendChild(div);
            });
            
            const statusDiv = document.getElementById('status');
            const updated = data.updated ? new Date(data.updated) : null;
            if (updated) {
                const mins = Math.round((Date.now() - updated.getTime()) / 60000);
                statusDiv.textContent = mins < 1 ? 'Updated just now' : `Updated ${mins}m ago`;
            } else {
                statusDiv.textContent = '';
            }
        }
        
        function updateMap(data) {
            Object.keys(data.flights).forEach(flightNum => {
                const flight = data.flights[flightNum];
                const positions = flight.positions;
                
                if (positions.length === 0) {
                    const routeParts = flight.route.split('-');
                    const origin = AIRPORTS[routeParts[0]];
                    const dest = AIRPORTS[routeParts[1]];
                    
                    if (origin && dest) {
                        if (!map.getSource(`planned-${flightNum}`)) {
                            map.addSource(`planned-${flightNum}`, {
                                type: 'geojson',
                                data: {
                                    type: 'Feature',
                                    geometry: {
                                        type: 'LineString',
                                        coordinates: greatCircle(origin, dest)
                                    }
                                }
                            });
                            
                            map.addLayer({
                                id: `planned-${flightNum}`,
                                type: 'line',
                                source: `planned-${flightNum}`,
                                paint: {
                                    'line-color': '#999',
                                    'line-width': 1,
                                    'line-dasharray': [4, 4],
                                    'line-opacity': 0.5
                                }
                            });
                        }
                    }
                } else {
                    if (map.getLayer(`planned-${flightNum}`)) {
                        map.removeLayer(`planned-${flightNum}`);
                        map.removeSource(`planned-${flightNum}`);
                    }
                    
                    const coords = positions.map(p => [p.lon, p.lat]);
                    const lastPos = positions[positions.length - 1];
                    
                    if (map.getSource(`route-${flightNum}`)) {
                        map.getSource(`route-${flightNum}`).setData({
                            type: 'Feature',
                            geometry: {
                                type: 'LineString',
                                coordinates: coords
                            }
                        });
                    } else {
                        map.addSource(`route-${flightNum}`, {
                            type: 'geojson',
                            data: {
                                type: 'Feature',
                                geometry: {
                                    type: 'LineString',
                                    coordinates: coords
                                }
                            }
                        });
                        
                        map.addLayer({
                            id: `route-${flightNum}`,
                            type: 'line',
                            source: `route-${flightNum}`,
                            paint: {
                                'line-color': FLIGHT_COLORS[flightNum],
                                'line-width': 3,
                                'line-opacity': 0.8
                            }
                        });
                    }
                    
                    if (map.getSource(`plane-${flightNum}`)) {
                        map.getSource(`plane-${flightNum}`).setData({
                            type: 'Feature',
                            geometry: {
                                type: 'Point',
                                coordinates: [lastPos.lon, lastPos.lat]
                            },
                            properties: {
                                heading: lastPos.heading || 0
                            }
                        });
                    } else {
                        map.addSource(`plane-${flightNum}`, {
                            type: 'geojson',
                            data: {
                                type: 'Feature',
                                geometry: {
                                    type: 'Point',
                                    coordinates: [lastPos.lon, lastPos.lat]
                                },
                                properties: {
                                    heading: lastPos.heading || 0
                                }
                            }
                        });
                        
                        map.addLayer({
                            id: `plane-${flightNum}`,
                            type: 'symbol',
                            source: `plane-${flightNum}`,
                            layout: {
                                'icon-image': 'plane-icon',
                                'icon-size': 1,
                                'icon-rotate': ['get', 'heading'],
                                'icon-rotation-alignment': 'map',
                                'icon-allow-overlap': true,
                                'icon-ignore-placement': true
                            }
                        });
                    }
                }
            });
        }
        
        function fitMapBounds(data) {
            const bounds = new mapboxgl.LngLatBounds();
            
            Object.keys(data.flights).forEach(flightNum => {
                const flight = data.flights[flightNum];
                const route = FLIGHT_ROUTES[flightNum];
                const positions = flight.positions;
                
                if (positions.length > 0) {
                    positions.forEach(p => bounds.extend([p.lon, p.lat]));
                    bounds.extend(AIRPORTS[route.dest]);
                } else {
                    bounds.extend(AIRPORTS[route.origin]);
                    bounds.extend(AIRPORTS[route.dest]);
                }
            });
            
            if (!bounds.isEmpty()) {
                map.fitBounds(bounds, { padding: 60, maxZoom: 8 });
            }
        }
        
        async function fetchPositions() {
            try {
                const response = await fetch('data/positions.json?' + Date.now());
                const data = await response.json();
                flightData = data;
                updateFlightInfo(data);
                updateMap(data);
                if (!initialFitDone) {
                    fitMapBounds(data);
                    initialFitDone = true;
                }
            } catch (error) {
                console.error('Error fetching positions:', error);
                document.getElementById('status').textContent = 'Error loading data';
            }
        }
        
        map.on('load', () => {
            const planeImg = createPlaneIcon();
            planeImg.onload = () => {
                map.addImage('plane-icon', planeImg, { sdf: false });
            };
            
            Object.keys(AIRPORTS).forEach(code => {
                const coords = AIRPORTS[code];
                map.addSource(`airport-${code}`, {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: {
                            type: 'Point',
                            coordinates: coords
                        }
                    }
                });
                
                map.addLayer({
                    id: `airport-${code}-circle`,
                    type: 'circle',
                    source: `airport-${code}`,
                    paint: {
                        'circle-radius': 6,
                        'circle-color': '#333',
                        'circle-stroke-width': 2,
                        'circle-stroke-color': '#fff'
                    }
                });
                
                map.addLayer({
                    id: `airport-${code}-label`,
                    type: 'symbol',
                    source: `airport-${code}`,
                    layout: {
                        'text-field': code,
                        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                        'text-size': 12,
                        'text-offset': [0, -1.5],
                        'text-anchor': 'top'
                    },
                    paint: {
                        'text-color': '#333',
                        'text-halo-color': '#fff',
                        'text-halo-width': 2
                    }
                });
            });
            
            fetchPositions();
            setInterval(fetchPositions, 60000);
        });
    </script>
</head>
<body>
</body>
</html>
