<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peru Trip Flight Tracker</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        .mapboxgl-ctrl-bottom-left {
            display: none;
        }
        
        .mapboxgl-ctrl-bottom-right {
            display: none;
        }
        
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        
        .info-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 16px;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.12);
            max-width: 340px;
            font-size: 13px;
            z-index: 1;
        }
        
        .info-panel h1 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #444;
        }
        
        .flights-row {
            display: flex;
            gap: 8px;
        }
        
        .flight-info {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
            border-left: 3px solid #ccc;
            transition: box-shadow 0.2s, background 0.2s;
        }
        
        .flight-info.en-route {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            border-left-width: 4px;
        }
        
        .flight-info.en-route .flight-header h2 {
            font-size: 16px;
        }
        
        .flight-info.en-route .detail-value {
            color: #111;
        }
        
        .flight-info .flight-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            margin-bottom: 8px;
        }
        
        .flight-info h2 {
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            color: #111;
            line-height: 1.2;
        }
        
        .flight-info .route {
            font-size: 11px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        
        .flight-info .details {
            font-size: 11px;
            color: #666;
            line-height: 1.6;
        }
        
        .flight-info .detail-row {
            display: flex;
            justify-content: space-between;
        }
        
        .flight-info .detail-label {
            color: #999;
        }
        
        .flight-info .detail-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #333;
        }
        
        .flight-info .waiting {
            font-size: 11px;
            color: #aaa;
            font-style: italic;
        }
        
        .flight-info.landed {
            opacity: 0.92;
        }
        
        .flight-info.landed .flight-header h2 {
            color: #333;
        }
        
        .arrived {
            font-size: 11px;
            color: #0d9488;
            font-weight: 600;
            margin-top: 2px;
        }
        
        .arrived-detail {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            line-height: 1.5;
        }
        
        .next-up {
            padding: 10px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
            border-left: 3px solid #D4960E;
        }
        
        .next-up .next-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #999;
            margin-bottom: 4px;
        }
        
        .next-up .next-route {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }
        
        .next-up .next-detail {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
        
        .next-up .next-countdown {
            font-size: 13px;
            font-weight: 600;
            color: #D4960E;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
        
        .on-ground {
            padding: 10px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
            border-left: 3px solid #0d9488;
            margin-bottom: 8px;
        }
        
        .on-ground .ground-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #0d9488;
            margin-bottom: 2px;
        }
        
        .on-ground .ground-city {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }
        
        .approx-note {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            font-style: italic;
        }
        
        .status {
            font-size: 10px;
            color: #aaa;
            margin-top: 8px;
        }
        
        .itinerary-toggle {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #555;
            letter-spacing: 0.02em;
            cursor: pointer;
            margin-top: 10px;
            padding: 7px 10px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 6px;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.15s;
        }
        
        .itinerary-toggle:hover {
            background: rgba(0, 0, 0, 0.07);
            color: #333;
        }
        
        .itinerary-toggle .arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 9px;
            margin-right: 5px;
        }
        
        .itinerary-toggle.open .arrow {
            transform: rotate(90deg);
        }
        
        .itinerary-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .itinerary-drawer.open {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .itinerary-list {
            margin-top: 8px;
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 8px;
        }
        
        .leg-item {
            display: flex;
            gap: 10px;
            padding: 6px 0;
            font-size: 11px;
            line-height: 1.4;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            align-items: flex-start;
        }
        
        .leg-item:last-child {
            border-bottom: none;
        }
        
        .leg-date {
            flex-shrink: 0;
            width: 46px;
            font-weight: 600;
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .leg-route {
            flex: 1;
            min-width: 0;
        }
        
        .leg-route .leg-cities {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        
        .leg-route .leg-flight {
            color: #999;
            font-size: 10px;
        }
        
        .leg-route .leg-times {
            color: #aaa;
            font-size: 10px;
        }
        
        .leg-arrived {
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            background: #0d9488;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 6px;
            vertical-align: middle;
            letter-spacing: 0.02em;
        }
        
        .leg-en-route {
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            background: #C8413C;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 6px;
            vertical-align: middle;
            letter-spacing: 0.02em;
        }
        
        .leg-item.past .leg-cities {
            color: #aaa;
        }
        
        .leg-item.active .leg-cities {
            color: #111;
        }
        
        .leg-item.active {
            background: rgba(0,0,0,0.03);
            border-radius: 4px;
            padding: 6px 4px;
            margin: 0 -4px;
        }
        
        @media (max-width: 600px) {
            .info-panel {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                max-width: none;
                border-radius: 14px 14px 0 0;
                padding: 14px 16px;
                padding-bottom: max(14px, env(safe-area-inset-bottom));
                box-shadow: 0 -1px 8px rgba(0,0,0,0.1);
            }
            
            .info-panel h1 {
                font-size: 12px;
                margin-bottom: 8px;
            }
            
            .itinerary-drawer.open {
                max-height: 240px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel">
        <h1>Peru Trip Flight Tracker</h1>
        <div id="flights-container" class="flights-row"></div>
        <div class="status" id="status">Loading...</div>
        <div class="itinerary-toggle" id="itinerary-toggle" onclick="toggleItinerary()">
            <span class="arrow">&#9654;</span> See all flights!
        </div>
        <div class="itinerary-drawer" id="itinerary-drawer">
            <div class="itinerary-list" id="itinerary-list"></div>
        </div>
    </div>

    <script>
        const MAPBOX_TOKEN = 'pk.eyJ1Ijoic3RpbGVzIiwiYSI6ImNsd3Rpc3V2aTAzeXUydm9sMHdoN210b2oifQ.66AJmPYxe2ixku1o7Rwdlg';
        
        mapboxgl.accessToken = MAPBOX_TOKEN;
        
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/stiles/cmnaii7pa000101qpcx20eyd3',
            center: [-85, 15],
            zoom: 3,
            projection: 'mercator',
            customAttribution: 'Flight data © <a href="https://www.flightradar24.com" target="_blank">Flightradar24</a>',
            attributionControl: false
        });
        
        map.addControl(new mapboxgl.AttributionControl({
            compact: true
        }), 'top-right');
        
        const AIRPORTS = {
            LAX: [-118.4085, 33.9416],
            MIA: [-80.2906, 25.7959],
            LIM: [-77.1144, -12.0219],
            CUZ: [-71.9388, -13.5357],
            PEM: [-69.2285, -12.6136]
        };
        
        const LIVE_COLOR = '#C8413C';
        
        let itinerary = null;
        let flightData = null;
        
        let initialFitDone = false;
        
        function createPlaneIcon() {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24">
                <path fill="#111" stroke="#fff" stroke-width="0.5" d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
            </svg>`;
            const img = new Image(28, 28);
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
            return img;
        }
        
        function greatCircle(start, end, numPoints = 100) {
            const [lon1, lat1] = start;
            const [lon2, lat2] = end;
            const coords = [];
            
            for (let i = 0; i <= numPoints; i++) {
                const f = i / numPoints;
                const lat1Rad = lat1 * Math.PI / 180;
                const lat2Rad = lat2 * Math.PI / 180;
                const lon1Rad = lon1 * Math.PI / 180;
                const lon2Rad = lon2 * Math.PI / 180;
                
                const a = Math.sin((1 - f) * Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad))) / 
                          Math.sin(Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad)));
                const b = Math.sin(f * Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad))) / 
                          Math.sin(Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + 
                          Math.cos(lat1Rad) * Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad)));
                
                const x = a * Math.cos(lat1Rad) * Math.cos(lon1Rad) + b * Math.cos(lat2Rad) * Math.cos(lon2Rad);
                const y = a * Math.cos(lat1Rad) * Math.sin(lon1Rad) + b * Math.cos(lat2Rad) * Math.sin(lon2Rad);
                const z = a * Math.sin(lat1Rad) + b * Math.sin(lat2Rad);
                
                const latRad = Math.atan2(z, Math.sqrt(x * x + y * y));
                const lonRad = Math.atan2(y, x);
                
                coords.push([lonRad * 180 / Math.PI, latRad * 180 / Math.PI]);
            }
            
            return coords;
        }
        
        function flightStatus(flight) {
            if (flight.status === 'landed' || flight.status === 'en_route' || flight.status === 'scheduled') {
                return flight.status;
            }
            if ((flight.positions || []).length > 0) return 'en_route';
            return 'scheduled';
        }
        
        function destCode(route) {
            const parts = route.split('-');
            return parts[parts.length - 1] || '';
        }
        
        function getFlightColor(legId) {
            if (!flightData) return '#999';
            const flight = flightData.flights[legId];
            if (flight && flightStatus(flight) === 'en_route') return LIVE_COLOR;
            if (flight && flightStatus(flight) === 'landed') return '#999';
            return '#999';
        }
        
        function toggleItinerary() {
            const toggle = document.getElementById('itinerary-toggle');
            const drawer = document.getElementById('itinerary-drawer');
            toggle.classList.toggle('open');
            drawer.classList.toggle('open');
        }
        
        function formatLegTime(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        }
        
        function renderItinerary() {
            if (!itinerary) return;
            const list = document.getElementById('itinerary-list');
            const now = new Date();
            list.innerHTML = '';
            
            itinerary.legs.forEach((leg, i) => {
                const arrive = new Date(leg.arrive);
                const depart = new Date(leg.depart);
                const isPast = now > arrive;
                const isActive = now >= depart && now <= arrive;
                
                const posStatus = flightData && flightData.flights[leg.id]
                    ? flightStatus(flightData.flights[leg.id])
                    : null;
                const landed = posStatus === 'landed' || isPast;
                
                const div = document.createElement('div');
                div.className = 'leg-item' + (landed ? ' past' : '') + (isActive ? ' active' : '');
                
                const dateStr = new Date(leg.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                const flightLabel = leg.flight_number || 'TBD';
                const depTime = formatLegTime(leg.depart);
                const arrTime = formatLegTime(leg.arrive);
                let badge = '';
                if (landed) {
                    badge = `<span class="leg-arrived">Arrived</span>`;
                } else if (posStatus === 'en_route') {
                    badge = `<span class="leg-en-route">En route</span>`;
                }
                
                const approxNote = posData?.approximated ? ' <span style="color: #aaa; font-size: 10px; font-style: italic;">(approximated)</span>' : '';
                
                div.innerHTML = `
                    <div class="leg-date">${dateStr}</div>
                    <div class="leg-route">
                        <div class="leg-cities">${leg.origin.code} → ${leg.destination.code} ${badge}</div>
                        <div class="leg-flight">${flightLabel} · ${leg.airline}${approxNote}</div>
                        <div class="leg-times">${depTime} – ${arrTime}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        
        function getNextLeg() {
            if (!itinerary || !flightData) return null;
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            
            return itinerary.legs.find(leg => {
                const legDate = leg.date;
                const departTime = new Date(leg.depart);
                const isToday = legDate === today;
                const isFuture = departTime > now;
                const isTracked = flightData.flights[leg.id];
                
                return isFuture && (isToday || isTracked);
            }) || null;
        }
        
        function getLastLandedLeg() {
            if (!itinerary) return null;
            const now = new Date();
            let last = null;
            for (const leg of itinerary.legs) {
                if (new Date(leg.arrive) < now) last = leg;
            }
            return last;
        }
        
        function formatCountdown(ms) {
            if (ms <= 0) return 'any moment now';
            const totalMin = Math.floor(ms / 60000);
            const days = Math.floor(totalMin / 1440);
            const hours = Math.floor((totalMin % 1440) / 60);
            const mins = totalMin % 60;
            const parts = [];
            if (days > 0) parts.push(`${days}d`);
            if (hours > 0) parts.push(`${hours}h`);
            parts.push(`${mins}m`);
            return parts.join(' ');
        }
        
        function hasActiveFlights(data) {
            return Object.values(data.flights).some(f => flightStatus(f) === 'en_route');
        }
        
        function updateFlightInfo(data) {
            const container = document.getElementById('flights-container');
            container.innerHTML = '';
            
            const flightKeys = Object.keys(data.flights);
            const anyEnRoute = hasActiveFlights(data);
            
            if (!anyEnRoute) {
                const landed = getLastLandedLeg();
                const next = getNextLeg();
                
                if (landed) {
                    const groundDiv = document.createElement('div');
                    groundDiv.className = 'on-ground';
                    groundDiv.innerHTML = `
                        <div class="ground-label">On the ground</div>
                        <div class="ground-city">${landed.destination.name} (${landed.destination.code})</div>
                    `;
                    container.appendChild(groundDiv);
                }
                
                if (next) {
                    const ms = new Date(next.depart) - new Date();
                    const nextDiv = document.createElement('div');
                    nextDiv.className = 'next-up';
                    const flightLabel = next.flight_number || 'TBD';
                    const depTime = formatLegTime(next.depart);
                    nextDiv.innerHTML = `
                        <div class="next-label">Next flight</div>
                        <div class="next-route">${next.origin.code} → ${next.destination.code}</div>
                        <div class="next-detail">${flightLabel} · departs ${depTime}</div>
                        <div class="next-countdown">${formatCountdown(ms)}</div>
                    `;
                    container.appendChild(nextDiv);
                }
                
                if (!landed && !next && flightKeys.length === 0) {
                    container.innerHTML = '<div class="waiting">No active flights right now</div>';
                }
            }
            
            flightKeys.forEach(legId => {
                const flight = data.flights[legId];
                const positions = flight.positions || [];
                const lastPos = positions[positions.length - 1];
                const status = flightStatus(flight);
                const color = getFlightColor(legId);
                
                if (status !== 'en_route') return;
                
                const div = document.createElement('div');
                const statusClass = status === 'landed' ? ' landed' : status === 'en_route' ? ' en-route' : '';
                div.className = `flight-info${statusClass}`;
                div.style.borderLeftColor = color;
                
                const routeParts = flight.route.split('-');
                const routeDisplay = routeParts.join(' → ');
                const dest = destCode(flight.route);
                
                const leg = itinerary ? itinerary.legs.find(l => l.id === legId) : null;
                const displayName = leg ? (leg.flight_number || legId) : legId;
                
                if (status === 'landed' && lastPos) {
                    const landedTime = new Date(lastPos.ts * 1000);
                    const timeStr = landedTime.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
                    const approxNote = flight.approximated ? '<div class="approx-note">Route approximated from similar flight</div>' : '';
                    div.innerHTML = `
                        <div class="flight-header">
                            <h2>${displayName}</h2>
                            <span class="route">${routeDisplay}</span>
                        </div>
                        <div class="arrived">Arrived ${dest}</div>
                        <div class="arrived-detail">Last track ${timeStr}</div>
                        ${approxNote}
                    `;
                } else if (status === 'en_route' && lastPos) {
                    const alt = lastPos.alt ? Math.round(lastPos.alt).toLocaleString() : '—';
                    const speed = lastPos.speed ? Math.round(lastPos.speed) : '—';
                    const timeSince = Math.round((Date.now() / 1000 - lastPos.ts) / 60);
                    const timeLabel = timeSince < 1 ? 'just now' : `${timeSince}m ago`;
                    
                    div.innerHTML = `
                        <div class="flight-header">
                            <h2>${displayName}</h2>
                            <span class="route">${routeDisplay}</span>
                        </div>
                        <div class="details">
                            <div class="detail-row"><span class="detail-label">Alt</span><span class="detail-value">${alt} ft</span></div>
                            <div class="detail-row"><span class="detail-label">Speed</span><span class="detail-value">${speed} kt</span></div>
                            <div class="detail-row"><span class="detail-label">Updated</span><span class="detail-value">${timeLabel}</span></div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="flight-header">
                            <h2>${displayName}</h2>
                            <span class="route">${routeDisplay}</span>
                        </div>
                        <div class="waiting">Waiting for departure</div>
                    `;
                }
                
                container.appendChild(div);
            });
            
            const statusDiv = document.getElementById('status');
            const updated = data.updated ? new Date(data.updated) : null;
            if (updated) {
                const mins = Math.round((Date.now() - updated.getTime()) / 60000);
                statusDiv.textContent = mins < 1 ? 'Updated just now' : `Updated ${mins}m ago`;
            } else {
                statusDiv.textContent = '';
            }
        }
        
        function removePlaneForFlight(flightNum) {
            if (!map.isStyleLoaded || !map.isStyleLoaded()) return;
            if (map.getLayer(`plane-${flightNum}`)) map.removeLayer(`plane-${flightNum}`);
            if (map.getSource(`plane-${flightNum}`)) map.removeSource(`plane-${flightNum}`);
        }
        
        let currentLocationMarker = null;
        
        function updateLocationPin(data) {
            if (hasActiveFlights(data)) {
                if (currentLocationMarker) {
                    currentLocationMarker.remove();
                    currentLocationMarker = null;
                }
                return;
            }
            
            const landed = getLastLandedLeg();
            if (!landed) return;
            
            const coords = AIRPORTS[landed.destination.code];
            if (!coords) return;
            
            if (currentLocationMarker) {
                currentLocationMarker.setLngLat(coords);
            } else {
                const el = document.createElement('div');
                el.style.cssText = 'width:14px;height:14px;background:#0d9488;border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3);';
                currentLocationMarker = new mapboxgl.Marker({ element: el })
                    .setLngLat(coords)
                    .addTo(map);
            }
        }
        
        let lastActiveState = null;
        
        function autoZoom(data) {
            const enRouteLeg = Object.keys(data.flights).find(id => flightStatus(data.flights[id]) === 'en_route');
            const stateKey = enRouteLeg || 'ground';
            
            if (stateKey === lastActiveState) return;
            lastActiveState = stateKey;
            
            const bounds = new mapboxgl.LngLatBounds();
            
            if (enRouteLeg) {
                const flight = data.flights[enRouteLeg];
                const positions = flight.positions || [];
                const routeParts = flight.route.split('-');
                const origin = AIRPORTS[routeParts[0]];
                const dest = AIRPORTS[routeParts[routeParts.length - 1]];
                
                if (origin) bounds.extend(origin);
                if (dest) bounds.extend(dest);
                positions.forEach(p => bounds.extend([p.lon, p.lat]));
            } else {
                const landed = getLastLandedLeg();
                const next = getNextLeg();
                if (landed) bounds.extend(AIRPORTS[landed.destination.code]);
                if (next) bounds.extend(AIRPORTS[next.origin.code]);
                if (next) bounds.extend(AIRPORTS[next.destination.code]);
            }
            
            if (!bounds.isEmpty()) {
                map.flyTo ? map.fitBounds(bounds, { padding: 80, maxZoom: 8, duration: 1500 }) : map.fitBounds(bounds, { padding: 80, maxZoom: 8 });
            }
        }
        
        function updateMap(data) {
            Object.keys(data.flights).forEach(legId => {
                const flight = data.flights[legId];
                const positions = flight.positions || [];
                const status = flightStatus(flight);
                const color = getFlightColor(legId);
                
                if (positions.length === 0) {
                    removePlaneForFlight(legId);
                    const routeParts = flight.route.split('-');
                    const origin = AIRPORTS[routeParts[0]];
                    const dest = AIRPORTS[routeParts[routeParts.length - 1]];
                    
                    if (origin && dest) {
                        if (!map.getSource(`planned-${legId}`)) {
                            map.addSource(`planned-${legId}`, {
                                type: 'geojson',
                                data: {
                                    type: 'Feature',
                                    geometry: {
                                        type: 'LineString',
                                        coordinates: greatCircle(origin, dest)
                                    }
                                }
                            });
                            
                            map.addLayer({
                                id: `planned-${legId}`,
                                type: 'line',
                                source: `planned-${legId}`,
                                paint: {
                                    'line-color': '#999',
                                    'line-width': 1,
                                    'line-dasharray': [4, 4],
                                    'line-opacity': 0.5
                                }
                            });
                        }
                    }
                } else {
                    if (map.getLayer(`planned-${legId}`)) {
                        map.removeLayer(`planned-${legId}`);
                        map.removeSource(`planned-${legId}`);
                    }
                    
                    const coords = positions.map(p => [p.lon, p.lat]);
                    const lastPos = positions[positions.length - 1];
                    const lineOpacity = status === 'landed' ? 0.5 : 0.85;
                    
                    if (map.getSource(`route-${legId}`)) {
                        map.getSource(`route-${legId}`).setData({
                            type: 'Feature',
                            geometry: {
                                type: 'LineString',
                                coordinates: coords
                            }
                        });
                    } else {
                        map.addSource(`route-${legId}`, {
                            type: 'geojson',
                            data: {
                                type: 'Feature',
                                geometry: {
                                    type: 'LineString',
                                    coordinates: coords
                                }
                            }
                        });
                        
                        map.addLayer({
                            id: `route-${legId}`,
                            type: 'line',
                            source: `route-${legId}`,
                            paint: {
                                'line-color': color,
                                'line-width': 3,
                                'line-opacity': lineOpacity
                            }
                        });
                    }
                    
                    if (map.getLayer(`route-${legId}`)) {
                        map.setPaintProperty(`route-${legId}`, 'line-opacity', lineOpacity);
                    }
                    
                    if (status === 'landed') {
                        removePlaneForFlight(legId);
                    } else if (map.getSource(`plane-${legId}`)) {
                        map.getSource(`plane-${legId}`).setData({
                            type: 'Feature',
                            geometry: {
                                type: 'Point',
                                coordinates: [lastPos.lon, lastPos.lat]
                            },
                            properties: {
                                heading: lastPos.heading || 0
                            }
                        });
                    } else {
                        map.addSource(`plane-${legId}`, {
                            type: 'geojson',
                            data: {
                                type: 'Feature',
                                geometry: {
                                    type: 'Point',
                                    coordinates: [lastPos.lon, lastPos.lat]
                                },
                                properties: {
                                    heading: lastPos.heading || 0
                                }
                            }
                        });
                        
                        map.addLayer({
                            id: `plane-${legId}`,
                            type: 'symbol',
                            source: `plane-${legId}`,
                            layout: {
                                'icon-image': 'plane-icon',
                                'icon-size': 1,
                                'icon-rotate': ['get', 'heading'],
                                'icon-rotation-alignment': 'map',
                                'icon-allow-overlap': true,
                                'icon-ignore-placement': true
                            }
                        });
                    }
                }
            });
        }
        
        function fitMapBounds(data) {
            const bounds = new mapboxgl.LngLatBounds();
            const anyEnRoute = hasActiveFlights(data);
            
            if (anyEnRoute) {
                Object.keys(data.flights).forEach(legId => {
                    const flight = data.flights[legId];
                    if (flightStatus(flight) !== 'en_route') return;
                    const positions = flight.positions || [];
                    const routeParts = flight.route.split('-');
                    const origin = AIRPORTS[routeParts[0]];
                    const dest = AIRPORTS[routeParts[routeParts.length - 1]];
                    if (origin) bounds.extend(origin);
                    if (dest) bounds.extend(dest);
                    positions.forEach(p => bounds.extend([p.lon, p.lat]));
                });
            } else {
                const landed = getLastLandedLeg();
                const next = getNextLeg();
                if (landed) bounds.extend(AIRPORTS[landed.destination.code]);
                if (next) bounds.extend(AIRPORTS[next.origin.code]);
                if (next) bounds.extend(AIRPORTS[next.destination.code]);
            }
            
            if (!bounds.isEmpty()) {
                const isMobile = window.innerWidth <= 600;
                const padding = isMobile
                    ? { top: 40, bottom: 280, left: 20, right: 20 }
                    : { top: 80, bottom: 200, left: 40, right: 40 };
                map.fitBounds(bounds, {
                    padding,
                    maxZoom: 3.1
                });
            }
        }
        
        async function fetchItinerary() {
            try {
                const response = await fetch('data/itinerary.json?' + Date.now());
                itinerary = await response.json();
                
                renderItinerary();
            } catch (e) {
                console.warn('Could not load itinerary:', e);
            }
        }
        
        async function fetchPositions() {
            try {
                const response = await fetch('data/positions.json?' + Date.now());
                const data = await response.json();
                flightData = data;
                updateFlightInfo(data);
                renderItinerary();
                updateMap(data);
                updateLocationPin(data);
                if (!initialFitDone) {
                    fitMapBounds(data);
                    initialFitDone = true;
                    lastActiveState = hasActiveFlights(data)
                        ? Object.keys(data.flights).find(id => flightStatus(data.flights[id]) === 'en_route')
                        : 'ground';
                } else {
                    autoZoom(data);
                }
            } catch (error) {
                console.error('Error fetching positions:', error);
                document.getElementById('status').textContent = 'Error loading data';
            }
        }
        
        function addAirportMarkers() {
            const usedCodes = new Set();
            if (itinerary) {
                itinerary.legs.forEach(leg => {
                    usedCodes.add(leg.origin.code);
                    usedCodes.add(leg.destination.code);
                });
            }
            if (flightData) {
                Object.values(flightData.flights).forEach(f => {
                    f.route.split('-').forEach(c => usedCodes.add(c));
                });
            }
            
            usedCodes.forEach(code => {
                const coords = AIRPORTS[code];
                if (!coords || map.getSource(`airport-${code}`)) return;
                
                map.addSource(`airport-${code}`, {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: coords }
                    }
                });
                
                map.addLayer({
                    id: `airport-${code}-circle`,
                    type: 'circle',
                    source: `airport-${code}`,
                    paint: {
                        'circle-radius': 5,
                        'circle-color': '#333',
                        'circle-stroke-width': 2,
                        'circle-stroke-color': '#fff'
                    }
                });
                
                map.addLayer({
                    id: `airport-${code}-label`,
                    type: 'symbol',
                    source: `airport-${code}`,
                    layout: {
                        'text-field': code,
                        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                        'text-size': 12,
                        'text-offset': [0, -1.5],
                        'text-anchor': 'top'
                    },
                    paint: {
                        'text-color': '#333',
                        'text-halo-color': '#fff',
                        'text-halo-width': 2
                    }
                });
            });
        }
        
        map.on('load', async () => {
            const planeImg = createPlaneIcon();
            planeImg.onload = () => {
                map.addImage('plane-icon', planeImg, { sdf: false });
            };
            
            await fetchItinerary();
            addAirportMarkers();
            await fetchPositions();
            addAirportMarkers();
            
            setInterval(fetchPositions, 60000);
            setInterval(() => {
                if (flightData && !hasActiveFlights(flightData)) {
                    updateFlightInfo(flightData);
                }
            }, 30000);
        });
    </script>
</body>
</html>
